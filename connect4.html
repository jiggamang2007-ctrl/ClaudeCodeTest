<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connect Four</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #1a1a2e;
    font-family: 'Segoe UI', sans-serif;
    color: #fff;
  }
  h1 { font-size: 2.5rem; margin-bottom: 0.3rem; }
  #status {
    font-size: 1.3rem;
    margin-bottom: 1rem;
    height: 2rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .dot {
    width: 20px; height: 20px;
    border-radius: 50%;
    display: inline-block;
  }
  .dot.red { background: #e63946; }
  .dot.yellow { background: #f4d35e; }
  #board {
    background: #0f3460;
    border-radius: 12px;
    padding: 16px;
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 10px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .cell {
    width: 70px; height: 70px;
    background: #1a1a2e;
    border-radius: 50%;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
  }
  .cell:hover { transform: scale(1.08); }
  .cell.red { background: #e63946; box-shadow: inset 0 -4px 6px rgba(0,0,0,0.3); }
  .cell.yellow { background: #f4d35e; box-shadow: inset 0 -4px 6px rgba(0,0,0,0.3); }
  .cell.win { animation: pulse 0.6s infinite alternate; }
  @keyframes pulse {
    to { transform: scale(1.12); filter: brightness(1.4); }
  }
  #restart {
    margin-top: 1.2rem;
    padding: 0.6rem 2rem;
    font-size: 1rem;
    border: none;
    border-radius: 8px;
    background: #e63946;
    color: #fff;
    cursor: pointer;
    transition: background 0.2s;
  }
  #restart:hover { background: #c1121f; }
  @media (max-width: 600px) {
    .cell { width: 44px; height: 44px; }
    #board { gap: 6px; padding: 10px; }
    h1 { font-size: 1.6rem; }
  }
</style>
</head>
<body>

<h1>Connect Four</h1>
<div id="status"><span class="dot red"></span> Red's turn</div>
<div id="board"></div>
<button id="restart">New Game</button>

<script>
const ROWS = 6, COLS = 7;
let board, currentPlayer, gameOver;

function init() {
  board = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
  currentPlayer = 1;
  gameOver = false;
  render();
  updateStatus();
}

function render() {
  const el = document.getElementById('board');
  el.innerHTML = '';
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      if (board[r][c] === 1) cell.classList.add('red');
      else if (board[r][c] === 2) cell.classList.add('yellow');
      cell.addEventListener('click', () => dropPiece(c));
      cell.dataset.row = r;
      cell.dataset.col = c;
      el.appendChild(cell);
    }
  }
}

function updateStatus(msg) {
  const s = document.getElementById('status');
  if (msg) { s.innerHTML = msg; return; }
  const color = currentPlayer === 1 ? 'red' : 'yellow';
  const name = currentPlayer === 1 ? 'Red' : 'Yellow';
  s.innerHTML = `<span class="dot ${color}"></span> ${name}'s turn`;
}

function dropPiece(col) {
  if (gameOver) return;
  for (let r = ROWS - 1; r >= 0; r--) {
    if (board[r][col] === 0) {
      board[r][col] = currentPlayer;
      render();
      const win = checkWin(r, col);
      if (win) {
        gameOver = true;
        highlightWin(win);
        const name = currentPlayer === 1 ? 'Red' : 'Yellow';
        const color = currentPlayer === 1 ? 'red' : 'yellow';
        updateStatus(`<span class="dot ${color}"></span> ${name} wins!`);
        return;
      }
      if (board[0].every((_, c) => board[0][c] !== 0)) {
        gameOver = true;
        updateStatus("It's a draw!");
        return;
      }
      currentPlayer = currentPlayer === 1 ? 2 : 1;
      updateStatus();
      return;
    }
  }
}

function checkWin(row, col) {
  const dirs = [[0,1],[1,0],[1,1],[1,-1]];
  const p = board[row][col];
  for (const [dr, dc] of dirs) {
    let cells = [[row, col]];
    for (const sign of [1, -1]) {
      for (let i = 1; i < 4; i++) {
        const r = row + dr * i * sign, c = col + dc * i * sign;
        if (r >= 0 && r < ROWS && c >= 0 && c < COLS && board[r][c] === p)
          cells.push([r, c]);
        else break;
      }
    }
    if (cells.length >= 4) return cells;
  }
  return null;
}

function highlightWin(cells) {
  for (const [r, c] of cells) {
    const cell = document.querySelector(`.cell[data-row="${r}"][data-col="${c}"]`);
    if (cell) cell.classList.add('win');
  }
}

document.getElementById('restart').addEventListener('click', init);
init();
</script>
</body>
</html>
