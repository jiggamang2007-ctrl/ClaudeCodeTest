<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memecoin Pair Tracker</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#e0e0e0;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
.hdr{background:linear-gradient(135deg,#1a1a2e,#16213e);padding:12px 20px;border-bottom:1px solid #2a2a4a;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.hdr h1{font-size:18px;background:linear-gradient(90deg,#00f0ff,#b026ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.ctrls{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
select,input[type=number],input[type=text]{background:#111;color:#e0e0e0;border:1px solid #333;padding:5px 8px;border-radius:4px;font-size:11px}
select:focus,input:focus{outline:none;border-color:#00f0ff}
.btn{padding:5px 12px;border:none;border-radius:4px;cursor:pointer;font-size:11px;font-weight:600}
.btn-p{background:linear-gradient(135deg,#00f0ff,#0080ff);color:#000}
.sbar{background:#111118;padding:6px 20px;display:flex;justify-content:space-between;font-size:11px;color:#888;border-bottom:1px solid #1a1a2a}
.dot{width:7px;height:7px;background:#00ff88;border-radius:50%;display:inline-block;margin-right:5px;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.fbar{background:#0d0d16;padding:8px 20px;display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;border-bottom:1px solid #1a1a2a}
.fg{display:flex;flex-direction:column;gap:2px}
.fg label{font-size:9px;color:#555;text-transform:uppercase}
.fg input,.fg select{width:100px}
.pre{padding:4px 10px;border-radius:10px;font-size:10px;cursor:pointer;border:1px solid #333;background:#111;color:#aaa}
.pre:hover{border-color:#555}
.pre.on{background:#00f0ff22;border-color:#00f0ff;color:#00f0ff}
.main{padding:12px 20px}
.stats{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.sb{background:#12121e;border:1px solid #1e1e35;border-radius:6px;padding:7px 12px;flex:1;min-width:100px}
.sb .sl{font-size:9px;color:#555}
.sb .sv{font-size:15px;font-weight:700;color:#fff}
.chips{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap}
.ch{padding:4px 10px;border-radius:10px;font-size:10px;cursor:pointer;border:1px solid #333;background:#111;color:#aaa}
.ch.on{background:#00f0ff22;border-color:#00f0ff;color:#00f0ff}
.hmsg{font-size:10px;color:#555;margin-bottom:8px;padding:4px 8px;background:#12121e;border-radius:4px;border:1px solid #1e1e35}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:10px}
.card{background:#12121e;border:1px solid #1e1e35;border-radius:8px;padding:11px;position:relative;overflow:hidden;transition:.2s}
.card:hover{border-color:#3a3a5a}
.card.fl{animation:glow 1.5s ease-out}
.card.rugbad{border-color:#ff335544}
@keyframes glow{0%{border-color:#00f0ff;box-shadow:0 0 12px #00f0ff33}100%{border-color:#1e1e35;box-shadow:none}}
.ctop{display:flex;justify-content:space-between;margin-bottom:5px}
.cname{font-size:13px;font-weight:700;color:#fff}
.cage{font-size:10px;color:#555;margin-top:1px}
.cca{font-size:9px;color:#444;cursor:pointer;margin-top:1px;word-break:break-all}
.cca:hover{color:#666}
.ctag{font-size:9px;padding:2px 5px;border-radius:3px;font-weight:600;text-transform:uppercase}
.ct-sol{background:#9945ff22;color:#9945ff}
.ct-eth{background:#627eea22;color:#627eea}
.ct-bsc{background:#f3ba2f22;color:#f3ba2f}
.ct-base{background:#0052ff22;color:#0052ff}
.ct-oth{background:#33333322;color:#666}
.rug-box{display:flex;align-items:center;gap:6px;margin-bottom:6px;padding:5px 8px;border-radius:5px;font-size:10px;font-weight:600}
.rug-ok{background:#00ff8815;color:#00ff88;border:1px solid #00ff8833}
.rug-warn{background:#f3ba2f15;color:#f3ba2f;border:1px solid #f3ba2f33}
.rug-bad{background:#ff335515;color:#ff3355;border:1px solid #ff335533}
.rug-load{background:#22222215;color:#666;border:1px solid #33333333}
.flags{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:5px}
.fl-d{font-size:8px;padding:1px 4px;border-radius:2px;font-weight:600;background:#ff335522;color:#ff3355}
.fl-w{font-size:8px;padding:1px 4px;border-radius:2px;font-weight:600;background:#f3ba2f22;color:#f3ba2f}
.fl-g{font-size:8px;padding:1px 4px;border-radius:2px;font-weight:600;background:#00ff8822;color:#00ff88}
.cmeta{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;margin-bottom:7px;font-size:10px}
.mi{display:flex;flex-direction:column;gap:1px}
.ml{color:#444;font-size:9px}
.mv{color:#bbb;font-weight:600}
.mv.g{color:#00ff88}.mv.r{color:#ff3355}
.links{display:flex;gap:4px;flex-wrap:wrap}
.lk{font-size:9px;padding:3px 7px;border-radius:3px;text-decoration:none;font-weight:600}
.lk:hover{opacity:.8}
.lk-tw{background:#1da1f222;color:#1da1f2}
.lk-dx{background:#00f0ff22;color:#00f0ff}
.lk-sc{background:#00ff8822;color:#00ff88}
.lk-rg{background:#b026ff22;color:#b026ff}
.tr{position:absolute;top:7px;right:7px;font-size:8px;padding:2px 5px;border-radius:3px;font-weight:700;text-transform:uppercase}
.tr-h{background:#ff335522;color:#ff3355}
.tr-w{background:#f3ba2f22;color:#f3ba2f}
.tr-n{background:#00ff8822;color:#00ff88}
.empty{text-align:center;padding:30px;color:#444}
.empty h2{font-size:14px;color:#555;margin-bottom:5px}
.sp{display:inline-block;width:11px;height:11px;border:2px solid #333;border-top-color:#00f0ff;border-radius:50%;animation:spin .8s linear infinite;margin-right:4px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.log{background:#0a0a12;border:1px solid #1a1a2a;border-radius:5px;padding:8px;margin-bottom:10px;max-height:80px;overflow-y:auto;font-size:10px;color:#555;font-family:monospace}
@media(max-width:700px){.hdr,.main,.fbar{padding:8px}.grid{grid-template-columns:1fr}.cmeta{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="hdr">
  <h1>MEMECOIN PAIR TRACKER</h1>
  <div class="ctrls">
    <input type="text" id="search" placeholder="Search..." style="width:140px">
    <select id="sort">
      <option value="newest">Newest</option>
      <option value="rug">Best Rug Score</option>
      <option value="liq">Liquidity</option>
      <option value="vol">Volume</option>
      <option value="gain">Gainers</option>
    </select>
    <select id="interval">
      <option value="8000">8s</option>
      <option value="15000" selected>15s</option>
      <option value="30000">30s</option>
    </select>
    <button class="btn btn-p" onclick="doFetch()">Refresh</button>
  </div>
</div>
<div class="sbar" id="sbar">
  <div><span class="dot"></span><span id="stxt">Starting...</span></div>
  <div id="stime">--</div>
</div>
<div class="fbar">
  <div class="fg"><label>Min Liq ($)</label><input type="number" id="fLiq" value="0" min="0" step="500"></div>
  <div class="fg"><label>Min Txns</label><input type="number" id="fTxns" value="0" min="0" step="5"></div>
  <div class="fg"><label>Max Age</label>
    <select id="fAge">
      <option value="0" selected>Any</option>
      <option value="30">30m</option>
      <option value="60">1h</option>
      <option value="360">6h</option>
      <option value="1440">24h</option>
    </select>
  </div>
  <div class="fg"><label>Hide Rugs</label><input type="checkbox" id="fRug" checked style="width:16px;height:16px;accent-color:#00f0ff"></div>
  <div class="fg"><label>Presets</label>
    <div style="display:flex;gap:3px">
      <span class="pre on" onclick="preset('degen',this)">Degen</span>
      <span class="pre" onclick="preset('safe',this)">Safe</span>
      <span class="pre" onclick="preset('strict',this)">Strict</span>
    </div>
  </div>
</div>
<div class="main">
  <div class="stats">
    <div class="sb"><div class="sl">Total Pairs</div><div class="sv" id="xTotal">--</div></div>
    <div class="sb"><div class="sl">Showing</div><div class="sv" id="xShow">--</div></div>
    <div class="sb"><div class="sl">Rugs Caught</div><div class="sv" id="xRugs">--</div></div>
    <div class="sb"><div class="sl">Rug Checked</div><div class="sv" id="xChecked">--</div></div>
  </div>
  <div class="chips">
    <div class="ch on" onclick="setC('all',this)">All</div>
    <div class="ch" onclick="setC('solana',this)">Solana</div>
    <div class="ch" onclick="setC('ethereum',this)">ETH</div>
    <div class="ch" onclick="setC('bsc',this)">BSC</div>
    <div class="ch" onclick="setC('base',this)">Base</div>
  </div>
  <div class="log" id="log"></div>
  <div id="hmsg" class="hmsg" style="display:none"></div>
  <div class="grid" id="grid">
    <div class="empty"><h2>Starting up...</h2><p><span class="sp"></span>Fetching pairs...</p></div>
  </div>
</div>

<script>
const P = new Map();       // pairAddress -> pair data
const RC = new Map();      // tokenAddress -> rug result
const seen = new Set();
let chain = 'all';
let timer = null;
let busy = false;
let rugQueue = [];
let rugBusy = false;
let rugCount = 0;
let rugsBad = 0;

// ===== LOGGING =====
function log(msg) {
  const el = document.getElementById('log');
  const t = new Date().toLocaleTimeString();
  el.innerHTML = `[${t}] ${msg}<br>` + el.innerHTML;
  if (el.children.length > 30) el.innerHTML = el.innerHTML.split('<br>').slice(0, 20).join('<br>');
}

// ===== FETCH ALL NEW PAIRS =====
async function doFetch() {
  if (busy) return;
  busy = true;
  const st = document.getElementById('stxt');
  st.innerHTML = '<span class="sp"></span>Scanning...';
  let added = 0;

  try {
    // 1) Get latest token profiles (these are actively promoted/new tokens)
    const [profRes, boostRes] = await Promise.all([
      fetch('https://api.dexscreener.com/token-profiles/latest/v1').then(r => r.ok ? r.json() : []).catch(() => []),
      fetch('https://api.dexscreener.com/token-boosts/latest/v1').then(r => r.ok ? r.json() : []).catch(() => []),
    ]);

    log(`Got ${profRes.length} profiles, ${boostRes.length} boosts`);

    // Collect unique tokens by chain
    const byChain = {};
    const addTok = (ch, addr) => {
      if (!ch || !addr) return;
      if (!byChain[ch]) byChain[ch] = new Set();
      byChain[ch].add(addr);
    };

    for (const p of profRes) addTok(p.chainId, p.tokenAddress);
    for (const b of boostRes) addTok(b.chainId, b.tokenAddress);

    // 2) Fetch full pair data for all discovered tokens
    const fetches = [];
    for (const [ch, addrs] of Object.entries(byChain)) {
      const arr = [...addrs];
      for (let i = 0; i < arr.length; i += 30) {
        const batch = arr.slice(i, i + 30).join(',');
        fetches.push(
          fetch(`https://api.dexscreener.com/tokens/v1/${ch}/${batch}`)
            .then(r => r.ok ? r.json() : [])
            .catch(() => [])
        );
      }
    }

    // 3) Also search for trending meme terms to catch more pairs
    const terms = ['pump','pepe','doge','moon','cat','ai','trump','shib','meme','sol','bonk','wojak'];
    // Pick 4 random terms each refresh
    const picks = terms.sort(() => Math.random() - 0.5).slice(0, 4);
    for (const t of picks) {
      fetches.push(
        fetch(`https://api.dexscreener.com/latest/dex/search?q=${t}`)
          .then(r => r.ok ? r.json() : {})
          .then(d => d.pairs || [])
          .catch(() => [])
      );
    }

    const results = await Promise.all(fetches);

    for (const res of results) {
      if (!Array.isArray(res)) continue;
      for (const pair of res) {
        if (!pair.pairAddress) continue;
        const existed = P.has(pair.pairAddress);
        P.set(pair.pairAddress, pair);
        if (!existed) {
          added++;
          // Queue rug check for solana tokens
          const addr = pair.baseToken?.address;
          const ch = (pair.chainId || '').toLowerCase();
          if (ch.includes('solana') && addr && !RC.has(addr)) {
            RC.set(addr, { status: 'pending' });
            rugQueue.push(addr);
          }
        }
      }
    }

    // Cap at 1000
    if (P.size > 1000) {
      const sorted = [...P.entries()].sort((a, b) => (b[1].pairCreatedAt || 0) - (a[1].pairCreatedAt || 0));
      const keep = new Map(sorted.slice(0, 1000));
      P.clear();
      for (const [k, v] of keep) P.set(k, v);
    }

    log(`+${added} new pairs (${P.size} total). Searching: ${picks.join(', ')}`);
    render();
    st.innerHTML = `<span class="dot"></span>Live — ${P.size} pairs | +${added} new`;
    document.getElementById('stime').textContent = new Date().toLocaleTimeString();

  } catch (err) {
    log('ERROR: ' + err.message);
    st.textContent = 'Error: ' + err.message;
  }

  busy = false;
  processRug();
}

// ===== RUGCHECK API =====
async function processRug() {
  if (rugBusy || rugQueue.length === 0) return;
  rugBusy = true;

  while (rugQueue.length > 0) {
    const addr = rugQueue.shift();
    const existing = RC.get(addr);
    if (existing && existing.status !== 'pending') continue;

    try {
      const r = await fetch(`https://api.rugcheck.xyz/v1/tokens/${addr}/report/summary`);
      if (r.ok) {
        const d = await r.json();
        const risks = d.risks || [];
        const score = d.score ?? d.score_normalised ?? null;
        const lpLocked = d.lpLockedPct ?? null;

        let status = 'good';
        const hasMint = risks.some(r => (r.name || '').toLowerCase().includes('mint'));
        const hasFreeze = risks.some(r => (r.name || '').toLowerCase().includes('freeze'));
        const hasHoneypot = risks.some(r => (r.name || '').toLowerCase().includes('honeypot'));
        const dangerCount = risks.filter(r => r.level === 'danger' || r.level === 'critical').length;

        if (hasHoneypot || hasMint || dangerCount >= 2) {
          status = 'bad';
          rugsBad++;
        } else if (hasFreeze || dangerCount >= 1) {
          status = 'warn';
        }

        // Check top holders from risks
        const topHolder = risks.find(r => (r.name || '').toLowerCase().includes('holder') || (r.name || '').toLowerCase().includes('supply'));

        RC.set(addr, { status, risks, score, lpLocked });
        rugCount++;
        log(`RugCheck ${addr.slice(0,6)}...: ${status.toUpperCase()} (score: ${score}, risks: ${risks.length})`);
      } else {
        RC.set(addr, { status: 'unknown', risks: [], score: null });
        rugCount++;
      }
    } catch (e) {
      RC.set(addr, { status: 'unknown', risks: [], score: null });
      rugCount++;
    }

    // Don't hammer the API
    await new Promise(r => setTimeout(r, 400));

    // Re-render every few checks
    if (rugQueue.length % 5 === 0) render();
  }

  rugBusy = false;
  render();
}

// ===== HELPERS =====
function $(n) { return (n == null) ? '--' : n >= 1e6 ? '$'+(n/1e6).toFixed(2)+'M' : n >= 1e3 ? '$'+(n/1e3).toFixed(1)+'K' : '$'+n.toFixed(0); }
function ago(ts) { const s=Math.floor((Date.now()-ts)/1000); if(s<60)return s+'s'; const m=Math.floor(s/60); if(m<60)return m+'m'; const h=Math.floor(m/60); return h<24?h+'h':Math.floor(h/24)+'d'; }
function chn(id) { id=(id||'').toLowerCase(); if(id.includes('solana'))return 'solana'; if(id.includes('ethereum')||id==='eth')return 'ethereum'; if(id.includes('bsc')||id.includes('bnb'))return 'bsc'; if(id.includes('base'))return 'base'; return id; }
function ctcls(id) { const c=chn(id); return c==='solana'?'ct-sol':c==='ethereum'?'ct-eth':c==='bsc'?'ct-bsc':c==='base'?'ct-base':'ct-oth'; }

// ===== RENDER =====
function cardHTML(p) {
  const bt = p.baseToken || {};
  const qt = p.quoteToken || {};
  const isNew = !seen.has(p.pairAddress);
  const rug = RC.get(bt.address);
  const buys = p.txns?.h24?.buys || 0;
  const sells = p.txns?.h24?.sells || 0;
  const vol = p.volume?.h24 || 0;
  const liq = p.liquidity?.usd || 0;
  const pc5 = p.priceChange?.m5;
  const pc1 = p.priceChange?.h1;
  const pc24 = p.priceChange?.h24;

  let trC='tr-n',trL='NEW';
  if(vol>100000||(buys+sells)>500){trC='tr-h';trL='HOT';}
  else if(vol>10000||(buys+sells)>50){trC='tr-w';trL='WARM';}

  // Rug check display
  let rugHTML = '';
  const isSol = chn(p.chainId) === 'solana';
  if (isSol && rug) {
    if (rug.status === 'pending') {
      rugHTML = '<div class="rug-box rug-load"><span class="sp"></span>Checking RugCheck.xyz...</div>';
    } else if (rug.status === 'bad') {
      const riskNames = (rug.risks||[]).slice(0,3).map(r=>r.name||r.description||'Risk').join(' | ');
      rugHTML = `<div class="rug-box rug-bad">RUG: ${riskNames || 'Multiple danger flags'}</div>`;
    } else if (rug.status === 'warn') {
      const riskNames = (rug.risks||[]).filter(r=>r.level!=='info').slice(0,2).map(r=>r.name).join(' | ');
      rugHTML = `<div class="rug-box rug-warn">CAUTION: ${riskNames || 'Some risks'}</div>`;
    } else if (rug.status === 'good') {
      rugHTML = `<div class="rug-box rug-ok">SAFE — Score: ${rug.score ?? '?'}${rug.lpLocked != null ? ' | LP Locked: '+rug.lpLocked+'%' : ''}</div>`;
    }
  }

  // Non-solana heuristic
  if (!isSol) {
    const flags = [];
    if (buys > 10 && sells === 0) flags.push('HONEYPOT: 0 sells');
    if (liq < 500 && liq > 0) flags.push('Micro liq');
    if (p.fdv && liq > 0 && p.fdv/liq > 100) flags.push('FDV/Liq: '+(p.fdv/liq).toFixed(0)+'x');
    if (flags.length) rugHTML = `<div class="rug-box rug-${flags[0].includes('HONEYPOT')?'bad':'warn'}">${flags.join(' | ')}</div>`;
  }

  // Risk flags
  let flagsHTML = '';
  if (rug && rug.risks && rug.risks.length) {
    flagsHTML = '<div class="flags">' + rug.risks.slice(0,5).map(r => {
      const c = (r.level==='danger'||r.level==='critical') ? 'fl-d' : r.level==='warn' ? 'fl-w' : 'fl-g';
      return `<span class="${c}">${r.name||'risk'}</span>`;
    }).join('') + '</div>';
  }

  const tw = `https://x.com/search?q=${encodeURIComponent((bt.symbol||'')+' OR '+(bt.name||''))}&f=live`;
  const tw$ = `https://x.com/search?q=%24${encodeURIComponent(bt.symbol||'')}&f=live`;
  const dex = `https://dexscreener.com/${p.chainId}/${p.pairAddress}`;
  const exp = (chn(p.chainId)==='solana'?'https://solscan.io/token/':chn(p.chainId)==='ethereum'?'https://etherscan.io/token/':chn(p.chainId)==='bsc'?'https://bscscan.com/token/':'https://basescan.org/token/')+(bt.address||'');
  const rgUrl = isSol ? `https://rugcheck.xyz/tokens/${bt.address}` : `https://tokensniffer.com/token/${chn(p.chainId)==='ethereum'?'eth':chn(p.chainId)}/${bt.address}`;

  return `<div class="card ${isNew?'fl':''} ${rug&&rug.status==='bad'?'rugbad':''}">
    <span class="tr ${trC}">${trL}</span>
    <div class="ctop">
      <div>
        <div class="cname">${bt.symbol||'???'} / ${qt.symbol||'???'}</div>
        <div class="cage">${p.pairCreatedAt?ago(p.pairCreatedAt)+' ago':'?'} — ${bt.name||''}</div>
        <div class="cca" onclick="navigator.clipboard.writeText('${bt.address||''}')" title="Copy CA">${bt.address?(bt.address.slice(0,6)+'...'+bt.address.slice(-4)+' [copy]'):''}</div>
      </div>
      <span class="ctag ${ctcls(p.chainId)}">${chn(p.chainId)}</span>
    </div>
    ${rugHTML}${flagsHTML}
    <div class="cmeta">
      <div class="mi"><span class="ml">Price</span><span class="mv">${p.priceUsd?'$'+parseFloat(p.priceUsd).toFixed(8):'--'}</span></div>
      <div class="mi"><span class="ml">5m</span><span class="mv ${pc5>0?'g':pc5<0?'r':''}">${pc5!=null?(pc5>0?'+':'')+pc5.toFixed(1)+'%':'--'}</span></div>
      <div class="mi"><span class="ml">1h</span><span class="mv ${pc1>0?'g':pc1<0?'r':''}">${pc1!=null?(pc1>0?'+':'')+pc1.toFixed(1)+'%':'--'}</span></div>
      <div class="mi"><span class="ml">Liquidity</span><span class="mv">${$(liq)}</span></div>
      <div class="mi"><span class="ml">Vol 24h</span><span class="mv">${$(vol)}</span></div>
      <div class="mi"><span class="ml">FDV</span><span class="mv">${$(p.fdv)}</span></div>
      <div class="mi"><span class="ml">Buys</span><span class="mv g">${buys}</span></div>
      <div class="mi"><span class="ml">Sells</span><span class="mv r">${sells}</span></div>
      <div class="mi"><span class="ml">B/S</span><span class="mv ${buys>0&&sells===0?'r':''}">${buys>0?(sells/buys).toFixed(2):'--'}</span></div>
    </div>
    <div class="links">
      <a href="${tw}" target="_blank" class="lk lk-tw">X Search</a>
      <a href="${tw$}" target="_blank" class="lk lk-tw">$${bt.symbol||''}</a>
      <a href="${dex}" target="_blank" class="lk lk-dx">DEXScreener</a>
      <a href="${exp}" target="_blank" class="lk lk-sc">Explorer</a>
      <a href="${rgUrl}" target="_blank" class="lk lk-rg">RugCheck</a>
    </div>
  </div>`;
}

function render() {
  const fLiq = parseFloat(document.getElementById('fLiq').value) || 0;
  const fTxns = parseInt(document.getElementById('fTxns').value) || 0;
  const fAge = parseInt(document.getElementById('fAge').value) || 0;
  const fRug = document.getElementById('fRug').checked;
  const q = document.getElementById('search').value.toLowerCase().trim();
  const now = Date.now();

  let pairs = [...P.values()];
  let rugHidden = 0;

  pairs = pairs.filter(p => {
    if (chain !== 'all' && chn(p.chainId) !== chain) return false;
    if (q) {
      const hay = ((p.baseToken?.symbol||'')+' '+(p.baseToken?.name||'')+' '+(p.baseToken?.address||'')).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    if ((p.liquidity?.usd||0) < fLiq) return false;
    if (((p.txns?.h24?.buys||0)+(p.txns?.h24?.sells||0)) < fTxns) return false;
    if (fAge > 0 && p.pairCreatedAt && (now - p.pairCreatedAt)/60000 > fAge) return false;

    // Hide confirmed rugs
    if (fRug) {
      const rug = RC.get(p.baseToken?.address);
      if (rug && rug.status === 'bad') { rugHidden++; return false; }
      // Hide obvious honeypots
      if ((p.txns?.h24?.buys||0) > 10 && (p.txns?.h24?.sells||0) === 0) { rugHidden++; return false; }
    }
    return true;
  });

  // Sort
  const s = document.getElementById('sort').value;
  if (s==='newest') pairs.sort((a,b)=>(b.pairCreatedAt||0)-(a.pairCreatedAt||0));
  else if (s==='rug') pairs.sort((a,b)=>{const ra=RC.get(a.baseToken?.address),rb=RC.get(b.baseToken?.address);const sa=ra?(ra.status==='good'?2:ra.status==='warn'?1:0):-1;const sb=rb?(rb.status==='good'?2:rb.status==='warn'?1:0):-1;return sb-sa;});
  else if (s==='liq') pairs.sort((a,b)=>(b.liquidity?.usd||0)-(a.liquidity?.usd||0));
  else if (s==='vol') pairs.sort((a,b)=>(b.volume?.h24||0)-(a.volume?.h24||0));
  else if (s==='gain') pairs.sort((a,b)=>(b.priceChange?.h24||-999)-(a.priceChange?.h24||-999));

  document.getElementById('xTotal').textContent = P.size;
  document.getElementById('xShow').textContent = pairs.length;
  document.getElementById('xRugs').textContent = rugsBad;
  document.getElementById('xChecked').textContent = rugCount;

  const hm = document.getElementById('hmsg');
  const hidden = P.size - pairs.length;
  if (hidden > 0) { hm.style.display='block'; hm.textContent=`${hidden} hidden (${rugHidden} rugs, rest filtered)`; }
  else hm.style.display='none';

  const grid = document.getElementById('grid');
  if (!pairs.length) {
    grid.innerHTML = '<div class="empty"><h2>No pairs match filters</h2><p>Try "Degen" preset</p></div>';
  } else {
    grid.innerHTML = pairs.map(cardHTML).join('');
  }
  P.forEach(p => seen.add(p.pairAddress));
}

// ===== CONTROLS =====
function setC(c, el) { chain=c; document.querySelectorAll('.ch').forEach(e=>e.classList.remove('on')); el.classList.add('on'); render(); }

function preset(p, el) {
  document.querySelectorAll('.pre').forEach(e=>e.classList.remove('on')); el.classList.add('on');
  if (p==='degen') { document.getElementById('fLiq').value=0; document.getElementById('fTxns').value=0; document.getElementById('fAge').value='0'; document.getElementById('fRug').checked=false; }
  else if (p==='safe') { document.getElementById('fLiq').value=1000; document.getElementById('fTxns').value=10; document.getElementById('fAge').value='60'; document.getElementById('fRug').checked=true; }
  else if (p==='strict') { document.getElementById('fLiq').value=5000; document.getElementById('fTxns').value=50; document.getElementById('fAge').value='60'; document.getElementById('fRug').checked=true; }
  render();
}

function setupTimer() {
  if (timer) clearInterval(timer);
  const ms = parseInt(document.getElementById('interval').value);
  if (ms > 0) timer = setInterval(doFetch, ms);
}

document.getElementById('sort').addEventListener('change', render);
document.getElementById('interval').addEventListener('change', setupTimer);
document.getElementById('search').addEventListener('input', render);
['fLiq','fTxns','fAge'].forEach(id => document.getElementById(id).addEventListener('change', render));
document.getElementById('fRug').addEventListener('change', render);

// ===== START =====
log('Starting tracker...');
doFetch();
setupTimer();
</script>
</body>
</html>
