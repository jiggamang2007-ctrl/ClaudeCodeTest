<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memecoin Pair Tracker</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0a0a0f;
  color: #e0e0e0;
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  min-height: 100vh;
}

.header {
  background: linear-gradient(135deg, #1a1a2e, #16213e);
  padding: 20px 30px;
  border-bottom: 1px solid #2a2a4a;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
}

.header h1 {
  font-size: 22px;
  background: linear-gradient(90deg, #00f0ff, #b026ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.controls {
  display: flex;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap;
}

.controls select, .controls input {
  background: #111;
  color: #e0e0e0;
  border: 1px solid #333;
  padding: 8px 12px;
  border-radius: 6px;
  font-size: 13px;
}

.controls select:focus, .controls input:focus {
  outline: none;
  border-color: #00f0ff;
}

.btn {
  padding: 8px 16px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  transition: all 0.2s;
}

.btn-primary {
  background: linear-gradient(135deg, #00f0ff, #0080ff);
  color: #000;
}

.btn-primary:hover { opacity: 0.85; }

.btn-danger {
  background: #ff3355;
  color: #fff;
}

.btn-danger:hover { opacity: 0.85; }

.status-bar {
  background: #111118;
  padding: 10px 30px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 12px;
  color: #888;
  border-bottom: 1px solid #1a1a2a;
}

.status-bar .live-dot {
  width: 8px;
  height: 8px;
  background: #00ff88;
  border-radius: 50%;
  display: inline-block;
  margin-right: 6px;
  animation: pulse 1.5s infinite;
}

.status-bar.paused .live-dot {
  background: #ff3355;
  animation: none;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

.main {
  padding: 20px 30px;
}

.filters {
  display: flex;
  gap: 10px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}

.filter-chip {
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 12px;
  cursor: pointer;
  border: 1px solid #333;
  background: #111;
  color: #aaa;
  transition: all 0.2s;
}

.filter-chip.active {
  background: #00f0ff22;
  border-color: #00f0ff;
  color: #00f0ff;
}

.filter-chip:hover { border-color: #555; }

.pair-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 14px;
}

.pair-card {
  background: #12121e;
  border: 1px solid #1e1e35;
  border-radius: 10px;
  padding: 16px;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}

.pair-card:hover {
  border-color: #3a3a5a;
  transform: translateY(-1px);
}

.pair-card.new-flash {
  animation: flash 1s ease-out;
}

@keyframes flash {
  0% { border-color: #00f0ff; box-shadow: 0 0 20px #00f0ff33; }
  100% { border-color: #1e1e35; box-shadow: none; }
}

.pair-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 10px;
}

.pair-name {
  font-size: 16px;
  font-weight: 700;
  color: #fff;
}

.pair-chain {
  font-size: 11px;
  padding: 3px 8px;
  border-radius: 4px;
  font-weight: 600;
  text-transform: uppercase;
}

.chain-solana { background: #9945ff22; color: #9945ff; }
.chain-ethereum { background: #627eea22; color: #627eea; }
.chain-bsc { background: #f3ba2f22; color: #f3ba2f; }
.chain-base { background: #0052ff22; color: #0052ff; }
.chain-other { background: #55555522; color: #888; }

.pair-meta {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 12px;
  font-size: 12px;
}

.meta-item {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.meta-label { color: #666; }
.meta-value { color: #ccc; font-weight: 600; }
.meta-value.green { color: #00ff88; }
.meta-value.red { color: #ff3355; }

.pair-links {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.pair-link {
  font-size: 11px;
  padding: 5px 10px;
  border-radius: 5px;
  text-decoration: none;
  font-weight: 600;
  transition: opacity 0.2s;
}

.pair-link:hover { opacity: 0.8; }

.link-twitter {
  background: #1da1f222;
  color: #1da1f2;
}

.link-dex {
  background: #00f0ff22;
  color: #00f0ff;
}

.link-chart {
  background: #b026ff22;
  color: #b026ff;
}

.link-scan {
  background: #00ff8822;
  color: #00ff88;
}

.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: #555;
}

.empty-state h2 { margin-bottom: 8px; color: #666; }

.pair-age {
  font-size: 11px;
  color: #666;
  margin-top: 2px;
}

.twitter-results {
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid #1e1e35;
}

.twitter-results summary {
  font-size: 12px;
  color: #1da1f2;
  cursor: pointer;
  user-select: none;
}

.twitter-results summary:hover { color: #4db8ff; }

.tweet-count {
  font-size: 11px;
  padding: 2px 7px;
  border-radius: 10px;
  background: #1da1f222;
  color: #1da1f2;
  margin-left: 4px;
}

.traction-badge {
  position: absolute;
  top: 12px;
  right: 12px;
  font-size: 10px;
  padding: 3px 8px;
  border-radius: 4px;
  font-weight: 700;
  text-transform: uppercase;
}

.traction-hot {
  background: #ff335522;
  color: #ff3355;
}

.traction-warm {
  background: #f3ba2f22;
  color: #f3ba2f;
}

.traction-new {
  background: #00ff8822;
  color: #00ff88;
}

.stats-row {
  display: flex;
  gap: 20px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}

.stat-box {
  background: #12121e;
  border: 1px solid #1e1e35;
  border-radius: 8px;
  padding: 12px 18px;
  min-width: 140px;
}

.stat-box .stat-label { font-size: 11px; color: #666; margin-bottom: 4px; }
.stat-box .stat-value { font-size: 20px; font-weight: 700; color: #fff; }

.loading-spinner {
  display: inline-block;
  width: 16px;
  height: 16px;
  border: 2px solid #333;
  border-top-color: #00f0ff;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-right: 6px;
  vertical-align: middle;
}

@keyframes spin { to { transform: rotate(360deg); } }

.search-box {
  background: #111;
  border: 1px solid #333;
  padding: 8px 12px;
  border-radius: 6px;
  color: #e0e0e0;
  font-size: 13px;
  width: 200px;
}

.search-box:focus { outline: none; border-color: #00f0ff; }

@media (max-width: 600px) {
  .header { padding: 14px; }
  .main { padding: 14px; }
  .pair-grid { grid-template-columns: 1fr; }
  .header h1 { font-size: 18px; }
}
</style>
</head>
<body>

<div class="header">
  <h1>MEMECOIN PAIR TRACKER</h1>
  <div class="controls">
    <input type="text" class="search-box" id="searchInput" placeholder="Search token name...">
    <select id="chainFilter">
      <option value="all">All Chains</option>
      <option value="solana">Solana</option>
      <option value="ethereum">Ethereum</option>
      <option value="bsc">BSC</option>
      <option value="base">Base</option>
    </select>
    <select id="sortBy">
      <option value="newest">Newest First</option>
      <option value="liquidity">Highest Liquidity</option>
      <option value="volume">Highest Volume</option>
      <option value="priceChange">Biggest Gainers</option>
    </select>
    <select id="refreshInterval">
      <option value="15000">Refresh: 15s</option>
      <option value="30000" selected>Refresh: 30s</option>
      <option value="60000">Refresh: 60s</option>
      <option value="0">Manual Only</option>
    </select>
    <button class="btn btn-primary" onclick="fetchPairs()">Refresh Now</button>
  </div>
</div>

<div class="status-bar" id="statusBar">
  <div>
    <span class="live-dot"></span>
    <span id="statusText">Connecting to DEXScreener...</span>
  </div>
  <div id="lastUpdate">Last update: --</div>
</div>

<div class="main">
  <div class="stats-row" id="statsRow">
    <div class="stat-box">
      <div class="stat-label">New Pairs (Last Hour)</div>
      <div class="stat-value" id="statPairsHour">--</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Total Tracked</div>
      <div class="stat-value" id="statTotal">--</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Avg Liquidity</div>
      <div class="stat-value" id="statAvgLiq">--</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Top Gainer</div>
      <div class="stat-value" id="statTopGainer">--</div>
    </div>
  </div>

  <div class="filters" id="chainFilters">
    <div class="filter-chip active" data-filter="all" onclick="setChainFilter(this, 'all')">All</div>
    <div class="filter-chip" data-filter="solana" onclick="setChainFilter(this, 'solana')">Solana</div>
    <div class="filter-chip" data-filter="ethereum" onclick="setChainFilter(this, 'ethereum')">Ethereum</div>
    <div class="filter-chip" data-filter="bsc" onclick="setChainFilter(this, 'bsc')">BSC</div>
    <div class="filter-chip" data-filter="base" onclick="setChainFilter(this, 'base')">Base</div>
  </div>

  <div class="pair-grid" id="pairGrid">
    <div class="empty-state">
      <h2>Loading new pairs...</h2>
      <p><span class="loading-spinner"></span> Fetching from DEXScreener</p>
    </div>
  </div>
</div>

<script>
let allPairs = [];
let seenPairAddresses = new Set();
let refreshTimer = null;
let currentChainFilter = 'all';
let currentSort = 'newest';

const CHAIN_MAP = {
  solana: 'solana',
  ethereum: 'ethereum',
  bsc: 'bsc',
  base: 'base',
  polygon: 'polygon',
  arbitrum: 'arbitrum',
  avalanche: 'avalanche',
};

const CHAIN_EXPLORERS = {
  solana: 'https://solscan.io/token/',
  ethereum: 'https://etherscan.io/token/',
  bsc: 'https://bscscan.com/token/',
  base: 'https://basescan.org/token/',
  polygon: 'https://polygonscan.com/token/',
  arbitrum: 'https://arbiscan.io/token/',
};

function formatUSD(n) {
  if (n == null) return '--';
  if (n >= 1e6) return '$' + (n / 1e6).toFixed(2) + 'M';
  if (n >= 1e3) return '$' + (n / 1e3).toFixed(1) + 'K';
  return '$' + n.toFixed(2);
}

function formatNum(n) {
  if (n == null) return '--';
  if (n >= 1e6) return (n / 1e6).toFixed(2) + 'M';
  if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
  return n.toFixed(0);
}

function timeAgo(timestamp) {
  const diff = Date.now() - timestamp;
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ago';
  return Math.floor(hrs / 24) + 'd ago';
}

function getChainClass(chainId) {
  const id = (chainId || '').toLowerCase();
  if (id.includes('solana')) return 'chain-solana';
  if (id.includes('ethereum') || id === 'eth') return 'chain-ethereum';
  if (id.includes('bsc') || id.includes('bnb')) return 'chain-bsc';
  if (id.includes('base')) return 'chain-base';
  return 'chain-other';
}

function getChainName(chainId) {
  const id = (chainId || '').toLowerCase();
  if (id.includes('solana')) return 'solana';
  if (id.includes('ethereum') || id === 'eth') return 'ethereum';
  if (id.includes('bsc') || id.includes('bnb')) return 'bsc';
  if (id.includes('base')) return 'base';
  return id;
}

function getTwitterSearchURL(tokenName, tokenSymbol) {
  const query = `${tokenSymbol} OR ${tokenName} memecoin`;
  return `https://x.com/search?q=${encodeURIComponent(query)}&f=live`;
}

function getTwitterCashtagURL(symbol) {
  return `https://x.com/search?q=%24${encodeURIComponent(symbol)}&f=live`;
}

function getDexScreenerURL(chainId, pairAddress) {
  return `https://dexscreener.com/${chainId}/${pairAddress}`;
}

function getExplorerURL(chainId, tokenAddress) {
  const chain = getChainName(chainId);
  const base = CHAIN_EXPLORERS[chain] || '';
  return base ? base + tokenAddress : '#';
}

function getTractionBadge(pair) {
  const vol = pair.volume?.h24 || 0;
  const liq = pair.liquidity?.usd || 0;
  const txns = (pair.txns?.h24?.buys || 0) + (pair.txns?.h24?.sells || 0);

  if (vol > 100000 || txns > 500) return { label: 'HOT', class: 'traction-hot' };
  if (vol > 10000 || txns > 50) return { label: 'WARM', class: 'traction-warm' };
  return { label: 'NEW', class: 'traction-new' };
}

function renderCard(pair) {
  const baseToken = pair.baseToken || {};
  const chainClass = getChainClass(pair.chainId);
  const chainName = getChainName(pair.chainId);
  const traction = getTractionBadge(pair);
  const priceChange = pair.priceChange?.h24;
  const isNew = !seenPairAddresses.has(pair.pairAddress);

  const twitterSearch = getTwitterSearchURL(baseToken.name || '', baseToken.symbol || '');
  const twitterCashtag = getTwitterCashtagURL(baseToken.symbol || '');
  const dexURL = getDexScreenerURL(pair.chainId, pair.pairAddress);
  const explorerURL = getExplorerURL(pair.chainId, baseToken.address || '');

  const buys = pair.txns?.h24?.buys || 0;
  const sells = pair.txns?.h24?.sells || 0;

  return `
    <div class="pair-card ${isNew ? 'new-flash' : ''}" data-chain="${chainName}" data-address="${pair.pairAddress}">
      <span class="traction-badge ${traction.class}">${traction.label}</span>
      <div class="pair-top">
        <div>
          <div class="pair-name">${baseToken.symbol || '???'} / ${pair.quoteToken?.symbol || '???'}</div>
          <div class="pair-age">${pair.pairCreatedAt ? timeAgo(pair.pairCreatedAt) : 'Unknown age'}</div>
          <div style="font-size:11px;color:#555;margin-top:2px;word-break:break-all;">${baseToken.address ? baseToken.address.slice(0, 8) + '...' + baseToken.address.slice(-6) : ''}</div>
        </div>
        <span class="pair-chain ${chainClass}">${chainName}</span>
      </div>
      <div class="pair-meta">
        <div class="meta-item">
          <span class="meta-label">Price</span>
          <span class="meta-value">${pair.priceUsd ? '$' + parseFloat(pair.priceUsd).toFixed(8) : '--'}</span>
        </div>
        <div class="meta-item">
          <span class="meta-label">24h Change</span>
          <span class="meta-value ${priceChange > 0 ? 'green' : priceChange < 0 ? 'red' : ''}">${priceChange != null ? (priceChange > 0 ? '+' : '') + priceChange.toFixed(1) + '%' : '--'}</span>
        </div>
        <div class="meta-item">
          <span class="meta-label">Liquidity</span>
          <span class="meta-value">${formatUSD(pair.liquidity?.usd)}</span>
        </div>
        <div class="meta-item">
          <span class="meta-label">24h Volume</span>
          <span class="meta-value">${formatUSD(pair.volume?.h24)}</span>
        </div>
        <div class="meta-item">
          <span class="meta-label">Buys / Sells (24h)</span>
          <span class="meta-value"><span class="green">${buys}</span> / <span class="red">${sells}</span></span>
        </div>
        <div class="meta-item">
          <span class="meta-label">FDV</span>
          <span class="meta-value">${formatUSD(pair.fdv)}</span>
        </div>
      </div>
      <div class="pair-links">
        <a href="${twitterSearch}" target="_blank" class="pair-link link-twitter">X Search</a>
        <a href="${twitterCashtag}" target="_blank" class="pair-link link-twitter">$${baseToken.symbol || ''}</a>
        <a href="${dexURL}" target="_blank" class="pair-link link-dex">DEXScreener</a>
        <a href="${explorerURL}" target="_blank" class="pair-link link-scan">Explorer</a>
      </div>
    </div>
  `;
}

function getFilteredPairs() {
  let pairs = [...allPairs];
  const search = document.getElementById('searchInput').value.toLowerCase().trim();

  if (currentChainFilter !== 'all') {
    pairs = pairs.filter(p => getChainName(p.chainId) === currentChainFilter);
  }

  if (search) {
    pairs = pairs.filter(p => {
      const name = (p.baseToken?.name || '').toLowerCase();
      const symbol = (p.baseToken?.symbol || '').toLowerCase();
      const addr = (p.baseToken?.address || '').toLowerCase();
      return name.includes(search) || symbol.includes(search) || addr.includes(search);
    });
  }

  const sortBy = document.getElementById('sortBy').value;
  switch (sortBy) {
    case 'newest':
      pairs.sort((a, b) => (b.pairCreatedAt || 0) - (a.pairCreatedAt || 0));
      break;
    case 'liquidity':
      pairs.sort((a, b) => (b.liquidity?.usd || 0) - (a.liquidity?.usd || 0));
      break;
    case 'volume':
      pairs.sort((a, b) => (b.volume?.h24 || 0) - (a.volume?.h24 || 0));
      break;
    case 'priceChange':
      pairs.sort((a, b) => (b.priceChange?.h24 || -999) - (a.priceChange?.h24 || -999));
      break;
  }

  return pairs;
}

function renderPairs() {
  const grid = document.getElementById('pairGrid');
  const filtered = getFilteredPairs();

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty-state"><h2>No pairs found</h2><p>Adjust your filters or wait for new pairs</p></div>`;
    return;
  }

  grid.innerHTML = filtered.map(renderCard).join('');

  // Update seen pairs after render
  allPairs.forEach(p => seenPairAddresses.add(p.pairAddress));
}

function updateStats() {
  const now = Date.now();
  const hourAgo = now - 3600000;
  const recentPairs = allPairs.filter(p => (p.pairCreatedAt || 0) > hourAgo);

  document.getElementById('statPairsHour').textContent = recentPairs.length;
  document.getElementById('statTotal').textContent = allPairs.length;

  const liqs = allPairs.map(p => p.liquidity?.usd || 0).filter(l => l > 0);
  const avgLiq = liqs.length > 0 ? liqs.reduce((a, b) => a + b, 0) / liqs.length : 0;
  document.getElementById('statAvgLiq').textContent = formatUSD(avgLiq);

  let topGainer = allPairs.reduce((best, p) => {
    const change = p.priceChange?.h24 || -999;
    return change > (best.priceChange?.h24 || -999) ? p : best;
  }, allPairs[0] || {});

  document.getElementById('statTopGainer').textContent = topGainer?.baseToken?.symbol
    ? topGainer.baseToken.symbol + ' +' + (topGainer.priceChange?.h24 || 0).toFixed(0) + '%'
    : '--';
}

async function fetchPairs() {
  const statusText = document.getElementById('statusText');
  statusText.innerHTML = '<span class="loading-spinner"></span> Fetching new pairs...';

  try {
    // DEXScreener latest pairs endpoint
    const response = await fetch('https://api.dexscreener.com/token-profiles/latest/v1');

    if (!response.ok) throw new Error('API returned ' + response.status);

    const profiles = await response.json();

    // Get token addresses from profiles to look up pairs
    // Fetch from the token boosts and new pairs endpoints too
    const [boostsRes, latestPairsRes] = await Promise.all([
      fetch('https://api.dexscreener.com/token-boosts/latest/v1').catch(() => null),
      fetch('https://api.dexscreener.com/latest/dex/pairs/solana,ethereum,bsc,base').catch(() => null),
    ]);

    // Collect unique token addresses grouped by chain
    const tokensByChain = {};
    for (const profile of profiles) {
      const chain = profile.chainId || 'solana';
      const addr = profile.tokenAddress;
      if (!addr) continue;
      if (!tokensByChain[chain]) tokensByChain[chain] = [];
      if (tokensByChain[chain].length < 15) {
        tokensByChain[chain].push(addr);
      }
    }

    // Also add boosted tokens
    if (boostsRes && boostsRes.ok) {
      const boosts = await boostsRes.json();
      for (const b of boosts) {
        const chain = b.chainId || 'solana';
        const addr = b.tokenAddress;
        if (!addr) continue;
        if (!tokensByChain[chain]) tokensByChain[chain] = [];
        if (tokensByChain[chain].length < 15 && !tokensByChain[chain].includes(addr)) {
          tokensByChain[chain].push(addr);
        }
      }
    }

    // Fetch pair data for each chain's tokens
    const pairPromises = Object.entries(tokensByChain).map(([chain, addrs]) =>
      fetch(`https://api.dexscreener.com/tokens/v1/${chain}/${addrs.join(',')}`)
        .then(r => r.ok ? r.json() : [])
        .catch(() => [])
    );

    const pairResults = await Promise.all(pairPromises);
    const newPairs = [];

    for (const result of pairResults) {
      if (Array.isArray(result)) {
        newPairs.push(...result);
      }
    }

    // Merge with existing, avoid duplicates
    const existingAddresses = new Set(allPairs.map(p => p.pairAddress));
    for (const pair of newPairs) {
      if (!existingAddresses.has(pair.pairAddress)) {
        allPairs.push(pair);
        existingAddresses.add(pair.pairAddress);
      } else {
        // Update existing pair data
        const idx = allPairs.findIndex(p => p.pairAddress === pair.pairAddress);
        if (idx >= 0) allPairs[idx] = pair;
      }
    }

    // Cap to last 500 pairs to prevent memory issues
    if (allPairs.length > 500) {
      allPairs.sort((a, b) => (b.pairCreatedAt || 0) - (a.pairCreatedAt || 0));
      allPairs = allPairs.slice(0, 500);
    }

    renderPairs();
    updateStats();

    const now = new Date();
    document.getElementById('lastUpdate').textContent = 'Last update: ' + now.toLocaleTimeString();
    statusText.innerHTML = `<span class="live-dot"></span> Live — tracking ${allPairs.length} pairs`;
    document.getElementById('statusBar').classList.remove('paused');

  } catch (err) {
    console.error('Fetch error:', err);
    statusText.textContent = 'Error: ' + err.message + '. Retrying...';
    document.getElementById('statusBar').classList.add('paused');

    // Try the simpler search endpoint as fallback
    try {
      const fallbackRes = await fetch('https://api.dexscreener.com/latest/dex/search?q=pepe doge wojak');
      if (fallbackRes.ok) {
        const data = await fallbackRes.json();
        if (data.pairs) {
          const existingAddresses = new Set(allPairs.map(p => p.pairAddress));
          for (const pair of data.pairs) {
            if (!existingAddresses.has(pair.pairAddress)) {
              allPairs.push(pair);
            }
          }
          renderPairs();
          updateStats();
          statusText.innerHTML = `<span class="live-dot"></span> Live (fallback) — tracking ${allPairs.length} pairs`;
          document.getElementById('statusBar').classList.remove('paused');
        }
      }
    } catch (e2) {
      console.error('Fallback also failed:', e2);
    }
  }
}

function setChainFilter(el, chain) {
  currentChainFilter = chain;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('chainFilter').value = chain;
  renderPairs();
}

function setupRefreshTimer() {
  if (refreshTimer) clearInterval(refreshTimer);
  const interval = parseInt(document.getElementById('refreshInterval').value);
  if (interval > 0) {
    refreshTimer = setInterval(fetchPairs, interval);
  }
}

// Event listeners
document.getElementById('chainFilter').addEventListener('change', (e) => {
  currentChainFilter = e.target.value;
  document.querySelectorAll('.filter-chip').forEach(c => {
    c.classList.toggle('active', c.dataset.filter === currentChainFilter);
  });
  renderPairs();
});

document.getElementById('sortBy').addEventListener('change', renderPairs);
document.getElementById('refreshInterval').addEventListener('change', setupRefreshTimer);
document.getElementById('searchInput').addEventListener('input', renderPairs);

// Start
fetchPairs();
setupRefreshTimer();
</script>
</body>
