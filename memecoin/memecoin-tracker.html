<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memecoin Pair Tracker</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0a0a0f;
  color: #e0e0e0;
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  min-height: 100vh;
}

.header {
  background: linear-gradient(135deg, #1a1a2e, #16213e);
  padding: 14px 20px;
  border-bottom: 1px solid #2a2a4a;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 10px;
}

.header h1 {
  font-size: 18px;
  background: linear-gradient(90deg, #00f0ff, #b026ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  white-space: nowrap;
}

.controls {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}

select, input[type="number"], input[type="text"] {
  background: #111;
  color: #e0e0e0;
  border: 1px solid #333;
  padding: 6px 10px;
  border-radius: 5px;
  font-size: 12px;
}

select:focus, input:focus { outline: none; border-color: #00f0ff; }

.btn {
  padding: 6px 14px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 600;
  transition: all 0.2s;
}

.btn-primary { background: linear-gradient(135deg, #00f0ff, #0080ff); color: #000; }
.btn-primary:hover { opacity: 0.85; }

.status-bar {
  background: #111118;
  padding: 8px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 11px;
  color: #888;
  border-bottom: 1px solid #1a1a2a;
}

.live-dot {
  width: 8px; height: 8px;
  background: #00ff88;
  border-radius: 50%;
  display: inline-block;
  margin-right: 5px;
  animation: pulse 1.5s infinite;
}

.paused .live-dot { background: #ff3355; animation: none; }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

/* Filter bar */
.filter-bar {
  background: #0d0d16;
  padding: 10px 20px;
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  align-items: flex-end;
  border-bottom: 1px solid #1a1a2a;
}

.fg { display: flex; flex-direction: column; gap: 3px; }
.fg label { font-size: 9px; color: #555; text-transform: uppercase; letter-spacing: 0.5px; }
.fg input, .fg select { width: 110px; }

.preset {
  padding: 5px 12px;
  border-radius: 12px;
  font-size: 11px;
  cursor: pointer;
  border: 1px solid #333;
  background: #111;
  color: #aaa;
  transition: 0.2s;
}

.preset:hover { border-color: #555; }
.preset.active { background: #00f0ff22; border-color: #00f0ff; color: #00f0ff; }

.toggle-wrap { display: flex; align-items: center; gap: 6px; height: 30px; }
.toggle-wrap label.tl { font-size: 11px; color: #aaa; cursor: pointer; }

.cb { width: 16px; height: 16px; accent-color: #00f0ff; cursor: pointer; }

.main { padding: 14px 20px; }

.stats-row { display: flex; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }

.stat-box {
  background: #12121e;
  border: 1px solid #1e1e35;
  border-radius: 7px;
  padding: 8px 14px;
  flex: 1;
  min-width: 110px;
}

.stat-box .sl { font-size: 9px; color: #555; margin-bottom: 2px; }
.stat-box .sv { font-size: 16px; font-weight: 700; color: #fff; }

.chips { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }

.chip {
  padding: 4px 11px;
  border-radius: 12px;
  font-size: 11px;
  cursor: pointer;
  border: 1px solid #333;
  background: #111;
  color: #aaa;
  transition: 0.2s;
}

.chip.active { background: #00f0ff22; border-color: #00f0ff; color: #00f0ff; }

.hidden-msg {
  font-size: 11px;
  color: #555;
  margin-bottom: 10px;
  padding: 5px 10px;
  background: #12121e;
  border-radius: 5px;
  border: 1px solid #1e1e35;
}

.pair-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(370px, 1fr));
  gap: 10px;
}

.pair-card {
  background: #12121e;
  border: 1px solid #1e1e35;
  border-radius: 9px;
  padding: 12px;
  position: relative;
  overflow: hidden;
  transition: 0.2s;
}

.pair-card:hover { border-color: #3a3a5a; }
.pair-card.flash { animation: flash 1.5s ease-out; }
.pair-card.danger-border { border-color: #ff335544; }

@keyframes flash {
  0% { border-color: #00f0ff; box-shadow: 0 0 15px #00f0ff33; }
  100% { border-color: #1e1e35; box-shadow: none; }
}

.card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
.card-name { font-size: 14px; font-weight: 700; color: #fff; }
.card-age { font-size: 10px; color: #555; margin-top: 2px; }
.card-ca { font-size: 9px; color: #444; margin-top: 2px; cursor: pointer; word-break: break-all; }
.card-ca:hover { color: #666; }

.chain-tag {
  font-size: 9px;
  padding: 2px 6px;
  border-radius: 3px;
  font-weight: 600;
  text-transform: uppercase;
}

.ct-solana { background: #9945ff22; color: #9945ff; }
.ct-ethereum { background: #627eea22; color: #627eea; }
.ct-bsc { background: #f3ba2f22; color: #f3ba2f; }
.ct-base { background: #0052ff22; color: #0052ff; }
.ct-other { background: #33333322; color: #666; }

/* Rug check result */
.rug-result {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
  padding: 6px 10px;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 600;
}

.rug-good { background: #00ff8815; color: #00ff88; border: 1px solid #00ff8833; }
.rug-warn { background: #f3ba2f15; color: #f3ba2f; border: 1px solid #f3ba2f33; }
.rug-bad { background: #ff335515; color: #ff3355; border: 1px solid #ff335533; }
.rug-loading { background: #33333315; color: #666; border: 1px solid #33333333; }

.rug-score-bar {
  width: 60px;
  height: 5px;
  background: #1a1a2a;
  border-radius: 3px;
  overflow: hidden;
}

.rug-score-fill { height: 100%; border-radius: 3px; }

.flags { display: flex; gap: 3px; flex-wrap: wrap; margin-bottom: 6px; }

.flag {
  font-size: 8px;
  padding: 2px 5px;
  border-radius: 3px;
  font-weight: 600;
  text-transform: uppercase;
}

.fl-danger { background: #ff335522; color: #ff3355; }
.fl-warn { background: #f3ba2f22; color: #f3ba2f; }
.fl-good { background: #00ff8822; color: #00ff88; }

.card-meta {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 5px;
  margin-bottom: 8px;
  font-size: 10px;
}

.mi { display: flex; flex-direction: column; gap: 1px; }
.ml { color: #444; font-size: 9px; }
.mv { color: #bbb; font-weight: 600; }
.mv.green { color: #00ff88; }
.mv.red { color: #ff3355; }

.card-links { display: flex; gap: 5px; flex-wrap: wrap; }

.cl {
  font-size: 9px;
  padding: 3px 8px;
  border-radius: 4px;
  text-decoration: none;
  font-weight: 600;
  transition: 0.2s;
}

.cl:hover { opacity: 0.8; }
.cl-tw { background: #1da1f222; color: #1da1f2; }
.cl-dex { background: #00f0ff22; color: #00f0ff; }
.cl-scan { background: #00ff8822; color: #00ff88; }
.cl-rug { background: #b026ff22; color: #b026ff; }

.traction {
  position: absolute;
  top: 8px;
  right: 8px;
  font-size: 8px;
  padding: 2px 6px;
  border-radius: 3px;
  font-weight: 700;
  text-transform: uppercase;
}

.tr-hot { background: #ff335522; color: #ff3355; }
.tr-warm { background: #f3ba2f22; color: #f3ba2f; }
.tr-new { background: #00ff8822; color: #00ff88; }

.empty { text-align: center; padding: 40px 20px; color: #444; }
.empty h2 { color: #555; margin-bottom: 6px; font-size: 16px; }

.spinner {
  display: inline-block;
  width: 12px; height: 12px;
  border: 2px solid #333;
  border-top-color: #00f0ff;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-right: 4px;
  vertical-align: middle;
}

@keyframes spin { to { transform: rotate(360deg); } }

.sound-btn {
  cursor: pointer;
  font-size: 14px;
  padding: 3px 6px;
  border-radius: 4px;
  background: #111;
  border: 1px solid #333;
}

@media (max-width: 700px) {
  .header, .main, .filter-bar { padding: 10px; }
  .pair-grid { grid-template-columns: 1fr; }
  .card-meta { grid-template-columns: 1fr 1fr; }
}
</style>
</head>
<body>

<div class="header">
  <h1>MEMECOIN PAIR TRACKER</h1>
  <div class="controls">
    <input type="text" id="searchInput" placeholder="Search token / CA..." style="width:160px;">
    <select id="sortBy">
      <option value="newest">Newest First</option>
      <option value="rugScore">Best Rug Score</option>
      <option value="liquidity">Highest Liquidity</option>
      <option value="volume">Highest Volume</option>
      <option value="priceChange">Biggest Gainers</option>
    </select>
    <select id="refreshInterval">
      <option value="5000">Refresh: 5s</option>
      <option value="10000" selected>Refresh: 10s</option>
      <option value="15000">Refresh: 15s</option>
      <option value="30000">Refresh: 30s</option>
    </select>
    <button class="btn btn-primary" onclick="fetchNewPairs()">Refresh</button>
    <span class="sound-btn" id="soundBtn" onclick="toggleSound()">🔇</span>
  </div>
</div>

<div class="status-bar" id="statusBar">
  <div><span class="live-dot"></span><span id="statusText">Starting up...</span></div>
  <div id="lastUpdate">--</div>
</div>

<div class="filter-bar">
  <div class="fg">
    <label>Min Liquidity</label>
    <input type="number" id="fMinLiq" value="1000" min="0" step="500">
  </div>
  <div class="fg">
    <label>Min Volume 24h</label>
    <input type="number" id="fMinVol" value="0" min="0" step="500">
  </div>
  <div class="fg">
    <label>Min Txns 24h</label>
    <input type="number" id="fMinTxns" value="5" min="0" step="5">
  </div>
  <div class="fg">
    <label>Max Age</label>
    <select id="fMaxAge">
      <option value="5">5 min</option>
      <option value="15">15 min</option>
      <option value="30">30 min</option>
      <option value="60" selected>1 hour</option>
      <option value="360">6 hours</option>
      <option value="1440">24 hours</option>
      <option value="0">Any</option>
    </select>
  </div>
  <div class="fg">
    <label>Options</label>
    <div class="toggle-wrap">
      <input type="checkbox" class="cb" id="fHideRugs" checked>
      <label class="tl" for="fHideRugs">Hide Rugs</label>
    </div>
  </div>
  <div class="fg">
    <label>Presets</label>
    <div style="display:flex;gap:4px;">
      <span class="preset" onclick="setPreset('degen',this)">Degen</span>
      <span class="preset active" onclick="setPreset('safe',this)">Safe</span>
      <span class="preset" onclick="setPreset('strict',this)">Strict</span>
    </div>
  </div>
</div>

<div class="main">
  <div class="stats-row">
    <div class="stat-box"><div class="sl">Total Found</div><div class="sv" id="sTotal">--</div></div>
    <div class="stat-box"><div class="sl">Showing</div><div class="sv" id="sShowing">--</div></div>
    <div class="stat-box"><div class="sl">Rugs Filtered</div><div class="sv" id="sRugs">--</div></div>
    <div class="stat-box"><div class="sl">Rug Checked</div><div class="sv" id="sChecked">--</div></div>
    <div class="stat-box"><div class="sl">Top Gainer</div><div class="sv" id="sGainer">--</div></div>
  </div>

  <div class="chips">
    <div class="chip active" onclick="setChain('all',this)">All</div>
    <div class="chip" onclick="setChain('solana',this)">Solana</div>
    <div class="chip" onclick="setChain('eth',this)">Ethereum</div>
    <div class="chip" onclick="setChain('bsc',this)">BSC</div>
    <div class="chip" onclick="setChain('base',this)">Base</div>
  </div>

  <div class="hidden-msg" id="hiddenMsg" style="display:none;"></div>

  <div class="pair-grid" id="grid">
    <div class="empty">
      <h2>Loading brand new pairs...</h2>
      <p><span class="spinner"></span> Fetching from GeckoTerminal + running rug checks</p>
    </div>
  </div>
</div>

<script>
// ==================== STATE ====================
let allPairs = new Map(); // pairId -> pair data
let rugResults = new Map(); // tokenAddress -> { status, risks, score }
let rugCheckQueue = [];
let rugChecking = false;
let seenIds = new Set();
let chainFilter = 'all';
let soundOn = false;
let refreshTimer = null;
let fetching = false;
let rugCheckedCount = 0;
let rugsFound = 0;

// GeckoTerminal network IDs
const NETWORKS = {
  solana: 'solana',
  eth: 'eth',
  bsc: 'bsc',
  base: 'base',
};

const CHAIN_LABELS = { solana: 'Solana', eth: 'Ethereum', bsc: 'BSC', base: 'Base' };

const EXPLORERS = {
  solana: 'https://solscan.io/token/',
  eth: 'https://etherscan.io/token/',
  bsc: 'https://bscscan.com/token/',
  base: 'https://basescan.org/token/',
};

// ==================== GECKO TERMINAL API ====================
// This endpoint returns ACTUALLY new pools as they are created

async function fetchNewPairs() {
  if (fetching) return;
  fetching = true;
  const st = document.getElementById('statusText');
  st.innerHTML = '<span class="spinner"></span> Scanning all chains for new pairs...';

  const prevSize = allPairs.size;
  let newCount = 0;

  try {
    // Fetch new pools from all chains in parallel
    const chains = Object.keys(NETWORKS);
    const fetches = chains.map(chain =>
      fetch(`https://api.geckoterminal.com/api/v2/networks/${NETWORKS[chain]}/new_pools?page=1`, {
        headers: { 'Accept': 'application/json' }
      })
      .then(r => r.ok ? r.json() : null)
      .catch(() => null)
      .then(data => ({ chain, data }))
    );

    // Also fetch page 2 for more coverage
    const fetches2 = chains.map(chain =>
      fetch(`https://api.geckoterminal.com/api/v2/networks/${NETWORKS[chain]}/new_pools?page=2`, {
        headers: { 'Accept': 'application/json' }
      })
      .then(r => r.ok ? r.json() : null)
      .catch(() => null)
      .then(data => ({ chain, data }))
    );

    const results = await Promise.all([...fetches, ...fetches2]);

    for (const { chain, data } of results) {
      if (!data || !data.data) continue;

      for (const pool of data.data) {
        const attrs = pool.attributes || {};
        const id = pool.id; // e.g. "solana_abc123"
        const pairAddr = attrs.address || '';

        // Extract token info from the name (format: "TOKEN / QUOTE")
        const nameParts = (attrs.name || '').split(' / ');
        const baseSymbol = nameParts[0] || '???';
        const quoteSymbol = nameParts[1] || '???';

        // Parse the pool data into our format
        const pair = {
          id: id,
          chain: chain,
          pairAddress: pairAddr,
          baseSymbol: baseSymbol.trim(),
          quoteSymbol: quoteSymbol.trim(),
          baseName: attrs.base_token_name || baseSymbol,
          baseAddress: attrs.base_token_address || '',
          quoteAddress: attrs.quote_token_address || '',
          priceUsd: parseFloat(attrs.base_token_price_usd) || 0,
          priceChange5m: parseFloat(attrs.price_change_percentage?.m5) || 0,
          priceChange1h: parseFloat(attrs.price_change_percentage?.h1) || 0,
          priceChange24h: parseFloat(attrs.price_change_percentage?.h24) || 0,
          volume24h: parseFloat(attrs.volume_usd?.h24) || 0,
          volume1h: parseFloat(attrs.volume_usd?.h1) || 0,
          reserveUsd: parseFloat(attrs.reserve_in_usd) || 0, // this is liquidity
          fdvUsd: parseFloat(attrs.fdv_usd) || 0,
          txns24hBuys: attrs.transactions?.h24?.buys || 0,
          txns24hSells: attrs.transactions?.h24?.sells || 0,
          txns1hBuys: attrs.transactions?.h1?.buys || 0,
          txns1hSells: attrs.transactions?.h1?.sells || 0,
          createdAt: attrs.pool_created_at ? new Date(attrs.pool_created_at).getTime() : Date.now(),
        };

        const existed = allPairs.has(id);
        allPairs.set(id, pair);

        if (!existed) {
          newCount++;
          // Queue for rug check if Solana
          if (chain === 'solana' && pair.baseAddress) {
            queueRugCheck(pair.baseAddress);
          }
        }
      }
    }

    // Trim to 800 newest
    if (allPairs.size > 800) {
      const sorted = [...allPairs.entries()].sort((a, b) => b[1].createdAt - a[1].createdAt);
      allPairs = new Map(sorted.slice(0, 800));
    }

    if (newCount > 0 && soundOn && prevSize > 0) playAlert();

    render();

    const now = new Date();
    document.getElementById('lastUpdate').textContent = now.toLocaleTimeString();
    st.innerHTML = `<span class="live-dot"></span> Live — ${allPairs.size} pairs | ${newCount} new this scan`;
    document.getElementById('statusBar').classList.remove('paused');

  } catch (err) {
    console.error(err);
    st.textContent = 'Error: ' + err.message;
    document.getElementById('statusBar').classList.add('paused');
  }

  fetching = false;

  // Process rug check queue
  processRugQueue();
}

// ==================== RUG CHECK API ====================
// Checks Solana tokens through RugCheck.xyz API

function queueRugCheck(tokenAddress) {
  if (rugResults.has(tokenAddress)) return;
  rugResults.set(tokenAddress, { status: 'pending', risks: [], score: null });
  rugCheckQueue.push(tokenAddress);
}

async function processRugQueue() {
  if (rugChecking || rugCheckQueue.length === 0) return;
  rugChecking = true;

  while (rugCheckQueue.length > 0) {
    const addr = rugCheckQueue.shift();
    if (!addr) continue;

    // Skip if already checked
    const existing = rugResults.get(addr);
    if (existing && existing.status !== 'pending') continue;

    try {
      const res = await fetch(`https://api.rugcheck.xyz/v1/tokens/${addr}/report/summary`);

      if (res.ok) {
        const data = await res.json();
        const risks = data.risks || [];
        const score = data.score != null ? data.score : null;
        const tokenName = data.tokenMeta?.name || '';
        const tokenSymbol = data.tokenMeta?.symbol || '';

        // Determine rug status
        let status = 'good';
        const dangerRisks = risks.filter(r => r.level === 'danger' || r.level === 'critical');
        const warnRisks = risks.filter(r => r.level === 'warn');

        if (dangerRisks.length >= 2 || risks.some(r =>
          r.name?.toLowerCase().includes('mint authority') ||
          r.name?.toLowerCase().includes('freeze authority') ||
          r.name?.toLowerCase().includes('honeypot')
        )) {
          status = 'bad';
          rugsFound++;
        } else if (dangerRisks.length >= 1 || warnRisks.length >= 2) {
          status = 'warn';
        }

        // Check for high owner concentration (insider/dev holdings)
        const topHolders = data.topHolders || [];
        let topHolderPct = 0;
        for (const h of topHolders) {
          if (h.pct > topHolderPct) topHolderPct = h.pct;
        }

        if (topHolderPct > 50) {
          risks.push({ name: `Top holder owns ${topHolderPct.toFixed(1)}%`, level: 'danger', description: 'Massive insider holding — likely dev wallet' });
          if (status !== 'bad') status = 'bad';
          if (status === 'good') rugsFound++;
        } else if (topHolderPct > 20) {
          risks.push({ name: `Top holder owns ${topHolderPct.toFixed(1)}%`, level: 'warn', description: 'High concentration' });
          if (status === 'good') status = 'warn';
        }

        rugResults.set(addr, { status, risks, score, topHolderPct, tokenName, tokenSymbol });
        rugCheckedCount++;
      } else {
        rugResults.set(addr, { status: 'unknown', risks: [], score: null });
      }
    } catch (e) {
      rugResults.set(addr, { status: 'unknown', risks: [], score: null });
    }

    // Small delay to not hammer the API
    await new Promise(r => setTimeout(r, 300));

    // Re-render periodically as results come in
    if (rugCheckQueue.length % 3 === 0) render();
  }

  rugChecking = false;
  render(); // Final render after all checks done
}

// ==================== HELPERS ====================

function fmtUSD(n) {
  if (!n && n !== 0) return '--';
  if (n >= 1e6) return '$' + (n / 1e6).toFixed(2) + 'M';
  if (n >= 1e3) return '$' + (n / 1e3).toFixed(1) + 'K';
  return '$' + n.toFixed(0);
}

function timeAgo(ts) {
  const d = Date.now() - ts;
  const s = Math.floor(d / 1000);
  if (s < 60) return s + 's ago';
  const m = Math.floor(s / 60);
  if (m < 60) return m + 'm ago';
  const h = Math.floor(m / 60);
  if (h < 24) return h + 'h ago';
  return Math.floor(h / 24) + 'd ago';
}

function chainClass(c) {
  return 'ct-' + (CHAIN_LABELS[c] ? c : 'other');
}

function chainLabel(c) {
  return CHAIN_LABELS[c] || c;
}

function playAlert() {
  try {
    const ctx = new AudioContext();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value = 880; o.type = 'sine'; g.gain.value = 0.12;
    o.start(); g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.25);
    o.stop(ctx.currentTime + 0.25);
  } catch(e) {}
}

function copyCA(addr) { navigator.clipboard.writeText(addr).catch(() => {}); }

// ==================== RENDERING ====================

function renderCard(pair) {
  const isNew = !seenIds.has(pair.id);
  const rug = rugResults.get(pair.baseAddress) || null;
  const buys = pair.txns24hBuys || 0;
  const sells = pair.txns24hSells || 0;
  const totalTxns = buys + sells;
  const vol = pair.volume24h;

  // Traction
  let trClass = 'tr-new', trLabel = 'NEW';
  if (vol > 100000 || totalTxns > 500) { trClass = 'tr-hot'; trLabel = 'HOT'; }
  else if (vol > 10000 || totalTxns > 50) { trClass = 'tr-warm'; trLabel = 'WARM'; }

  // Rug check display
  let rugHTML = '';
  if (pair.chain === 'solana' && rug) {
    if (rug.status === 'pending') {
      rugHTML = `<div class="rug-result rug-loading"><span class="spinner"></span> Checking RugCheck.xyz...</div>`;
    } else if (rug.status === 'bad') {
      const topRisks = rug.risks.slice(0, 3).map(r => r.name).join(' | ');
      rugHTML = `<div class="rug-result rug-bad">RUG DETECTED — ${topRisks}</div>`;
    } else if (rug.status === 'warn') {
      const topRisks = rug.risks.filter(r => r.level !== 'info').slice(0, 2).map(r => r.name).join(' | ');
      rugHTML = `<div class="rug-result rug-warn">CAUTION — ${topRisks || 'Some risks found'}</div>`;
    } else if (rug.status === 'good') {
      rugHTML = `<div class="rug-result rug-good">PASSED — RugCheck OK${rug.score != null ? ' (Score: ' + rug.score + ')' : ''}</div>`;
    } else {
      rugHTML = `<div class="rug-result rug-loading">RugCheck unavailable</div>`;
    }
  } else if (pair.chain !== 'solana') {
    // Non-Solana: basic heuristic flags
    let hFlags = [];
    if (buys > 10 && sells === 0) hFlags.push({ text: 'HONEYPOT: 0 sells', type: 'danger' });
    if (pair.reserveUsd < 500) hFlags.push({ text: 'Micro liquidity', type: 'danger' });
    if (pair.fdvUsd > 0 && pair.reserveUsd > 0 && pair.fdvUsd / pair.reserveUsd > 100)
      hFlags.push({ text: 'FDV/Liq ' + (pair.fdvUsd / pair.reserveUsd).toFixed(0) + 'x', type: 'danger' });
    if (vol > 0 && pair.reserveUsd > 0 && vol / pair.reserveUsd > 50)
      hFlags.push({ text: 'Wash trading suspected', type: 'danger' });
    if (buys > 5 && sells > 0 && sells / buys >= 0.3)
      hFlags.push({ text: 'Healthy B/S ratio', type: 'good' });

    if (hFlags.length > 0) {
      const hasDanger = hFlags.some(f => f.type === 'danger');
      const cls = hasDanger ? 'rug-bad' : 'rug-warn';
      rugHTML = `<div class="rug-result ${cls}">${hFlags.map(f => f.text).join(' | ')}</div>`;
    }
  }

  // Flags from rug check risks
  let flagsHTML = '';
  if (rug && rug.risks && rug.risks.length > 0) {
    flagsHTML = '<div class="flags">' + rug.risks.slice(0, 5).map(r => {
      const t = r.level === 'danger' || r.level === 'critical' ? 'danger' : r.level === 'warn' ? 'warn' : 'good';
      return `<span class="flag fl-${t}">${r.name}</span>`;
    }).join('') + '</div>';
  }

  // Links
  const twSearch = `https://x.com/search?q=${encodeURIComponent(pair.baseSymbol + ' OR ' + pair.baseName)}&f=live`;
  const twCash = `https://x.com/search?q=%24${encodeURIComponent(pair.baseSymbol)}&f=live`;
  const dexURL = `https://dexscreener.com/${pair.chain === 'eth' ? 'ethereum' : pair.chain}/${pair.pairAddress}`;
  const geckoURL = `https://www.geckoterminal.com/${pair.chain === 'eth' ? 'eth' : pair.chain}/pools/${pair.pairAddress}`;
  const explorerURL = (EXPLORERS[pair.chain] || '') + pair.baseAddress;
  const rugcheckURL = pair.chain === 'solana'
    ? `https://rugcheck.xyz/tokens/${pair.baseAddress}`
    : `https://tokensniffer.com/token/${pair.chain === 'eth' ? 'eth' : pair.chain}/${pair.baseAddress}`;

  const isDanger = rug && rug.status === 'bad';

  return `
    <div class="pair-card ${isNew ? 'flash' : ''} ${isDanger ? 'danger-border' : ''}">
      <span class="traction ${trClass}">${trLabel}</span>
      <div class="card-top">
        <div>
          <div class="card-name">${pair.baseSymbol} / ${pair.quoteSymbol}</div>
          <div class="card-age">${timeAgo(pair.createdAt)} — ${pair.baseName}</div>
          <div class="card-ca" onclick="copyCA('${pair.baseAddress}')" title="Click to copy">${pair.baseAddress ? pair.baseAddress.slice(0, 6) + '...' + pair.baseAddress.slice(-4) + ' [copy]' : ''}</div>
        </div>
        <span class="chain-tag ${chainClass(pair.chain)}">${chainLabel(pair.chain)}</span>
      </div>

      ${rugHTML}
      ${flagsHTML}

      <div class="card-meta">
        <div class="mi"><span class="ml">Price</span><span class="mv">${pair.priceUsd ? '$' + pair.priceUsd.toFixed(8) : '--'}</span></div>
        <div class="mi"><span class="ml">5m</span><span class="mv ${pair.priceChange5m > 0 ? 'green' : pair.priceChange5m < 0 ? 'red' : ''}">${pair.priceChange5m ? (pair.priceChange5m > 0 ? '+' : '') + pair.priceChange5m.toFixed(1) + '%' : '--'}</span></div>
        <div class="mi"><span class="ml">1h</span><span class="mv ${pair.priceChange1h > 0 ? 'green' : pair.priceChange1h < 0 ? 'red' : ''}">${pair.priceChange1h ? (pair.priceChange1h > 0 ? '+' : '') + pair.priceChange1h.toFixed(1) + '%' : '--'}</span></div>
        <div class="mi"><span class="ml">Liquidity</span><span class="mv">${fmtUSD(pair.reserveUsd)}</span></div>
        <div class="mi"><span class="ml">Vol 24h</span><span class="mv">${fmtUSD(pair.volume24h)}</span></div>
        <div class="mi"><span class="ml">FDV</span><span class="mv">${fmtUSD(pair.fdvUsd)}</span></div>
        <div class="mi"><span class="ml">Buys 24h</span><span class="mv green">${buys}</span></div>
        <div class="mi"><span class="ml">Sells 24h</span><span class="mv red">${sells}</span></div>
        <div class="mi"><span class="ml">B/S Ratio</span><span class="mv ${buys > 0 && sells === 0 ? 'red' : ''}">${buys > 0 ? (sells / buys).toFixed(2) : '--'}</span></div>
      </div>

      <div class="card-links">
        <a href="${twSearch}" target="_blank" class="cl cl-tw">X Search</a>
        <a href="${twCash}" target="_blank" class="cl cl-tw">$${pair.baseSymbol}</a>
        <a href="${dexURL}" target="_blank" class="cl cl-dex">DEXScreener</a>
        <a href="${geckoURL}" target="_blank" class="cl cl-dex">GeckoTerminal</a>
        <a href="${explorerURL}" target="_blank" class="cl cl-scan">Explorer</a>
        <a href="${rugcheckURL}" target="_blank" class="cl cl-rug">RugCheck</a>
      </div>
    </div>
  `;
}

function getFiltered() {
  const fMinLiq = parseFloat(document.getElementById('fMinLiq').value) || 0;
  const fMinVol = parseFloat(document.getElementById('fMinVol').value) || 0;
  const fMinTxns = parseInt(document.getElementById('fMinTxns').value) || 0;
  const fMaxAge = parseInt(document.getElementById('fMaxAge').value) || 0;
  const fHideRugs = document.getElementById('fHideRugs').checked;
  const search = document.getElementById('searchInput').value.toLowerCase().trim();
  const now = Date.now();

  let pairs = [...allPairs.values()];
  let hiddenByRug = 0;

  pairs = pairs.filter(p => {
    // Chain
    if (chainFilter !== 'all' && p.chain !== chainFilter) return false;

    // Search
    if (search) {
      const hay = (p.baseSymbol + ' ' + p.baseName + ' ' + p.baseAddress).toLowerCase();
      if (!hay.includes(search)) return false;
    }

    // Min liq
    if (p.reserveUsd < fMinLiq) return false;

    // Min vol
    if (p.volume24h < fMinVol) return false;

    // Min txns
    if ((p.txns24hBuys + p.txns24hSells) < fMinTxns) return false;

    // Max age
    if (fMaxAge > 0 && p.createdAt) {
      if ((now - p.createdAt) / 60000 > fMaxAge) return false;
    }

    // Hide rugs
    if (fHideRugs) {
      const rug = rugResults.get(p.baseAddress);
      if (rug && rug.status === 'bad') {
        hiddenByRug++;
        return false;
      }
      // Also hide obvious honeypots
      if (p.txns24hBuys > 10 && p.txns24hSells === 0) {
        hiddenByRug++;
        return false;
      }
    }

    return true;
  });

  // Sort
  const sort = document.getElementById('sortBy').value;
  switch (sort) {
    case 'newest': pairs.sort((a, b) => b.createdAt - a.createdAt); break;
    case 'rugScore':
      pairs.sort((a, b) => {
        const ra = rugResults.get(a.baseAddress);
        const rb = rugResults.get(b.baseAddress);
        const sa = ra ? (ra.status === 'good' ? 2 : ra.status === 'warn' ? 1 : 0) : -1;
        const sb = rb ? (rb.status === 'good' ? 2 : rb.status === 'warn' ? 1 : 0) : -1;
        return sb - sa;
      });
      break;
    case 'liquidity': pairs.sort((a, b) => b.reserveUsd - a.reserveUsd); break;
    case 'volume': pairs.sort((a, b) => b.volume24h - a.volume24h); break;
    case 'priceChange': pairs.sort((a, b) => (b.priceChange24h || -999) - (a.priceChange24h || -999)); break;
  }

  return { pairs, hiddenByRug };
}

function render() {
  const { pairs, hiddenByRug } = getFiltered();

  document.getElementById('sTotal').textContent = allPairs.size;
  document.getElementById('sShowing').textContent = pairs.length;
  document.getElementById('sRugs').textContent = rugsFound;
  document.getElementById('sChecked').textContent = rugCheckedCount;

  const allArr = [...allPairs.values()];
  const top = allArr.reduce((b, p) => (p.priceChange24h || -999) > (b.priceChange24h || -999) ? p : b, allArr[0] || {});
  document.getElementById('sGainer').textContent = top.baseSymbol
    ? top.baseSymbol + ' +' + (top.priceChange24h || 0).toFixed(0) + '%'
    : '--';

  const hm = document.getElementById('hiddenMsg');
  const totalHidden = allPairs.size - pairs.length;
  if (totalHidden > 0) {
    hm.style.display = 'block';
    hm.textContent = `${totalHidden} pairs hidden (${hiddenByRug} confirmed rugs, rest filtered by liq/vol/age)`;
  } else {
    hm.style.display = 'none';
  }

  const grid = document.getElementById('grid');
  if (pairs.length === 0) {
    grid.innerHTML = '<div class="empty"><h2>No pairs passed filters</h2><p>Try "Degen" preset or loosen filters</p></div>';
  } else {
    grid.innerHTML = pairs.map(renderCard).join('');
  }

  allPairs.forEach((_, k) => {
    const p = allPairs.get(k);
    if (p) seenIds.add(p.id);
  });
}

// ==================== CONTROLS ====================

function setChain(c, el) {
  chainFilter = c;
  document.querySelectorAll('.chip').forEach(e => e.classList.remove('active'));
  el.classList.add('active');
  render();
}

function setPreset(p, el) {
  document.querySelectorAll('.preset').forEach(e => e.classList.remove('active'));
  el.classList.add('active');

  if (p === 'degen') {
    document.getElementById('fMinLiq').value = 0;
    document.getElementById('fMinVol').value = 0;
    document.getElementById('fMinTxns').value = 0;
    document.getElementById('fMaxAge').value = '0';
    document.getElementById('fHideRugs').checked = false;
  } else if (p === 'safe') {
    document.getElementById('fMinLiq').value = 1000;
    document.getElementById('fMinVol').value = 0;
    document.getElementById('fMinTxns').value = 5;
    document.getElementById('fMaxAge').value = '60';
    document.getElementById('fHideRugs').checked = true;
  } else if (p === 'strict') {
    document.getElementById('fMinLiq').value = 5000;
    document.getElementById('fMinVol').value = 5000;
    document.getElementById('fMinTxns').value = 30;
    document.getElementById('fMaxAge').value = '60';
    document.getElementById('fHideRugs').checked = true;
  }
  render();
}

function toggleSound() {
  soundOn = !soundOn;
  document.getElementById('soundBtn').textContent = soundOn ? '🔊' : '🔇';
}

function setupTimer() {
  if (refreshTimer) clearInterval(refreshTimer);
  const ms = parseInt(document.getElementById('refreshInterval').value);
  if (ms > 0) refreshTimer = setInterval(fetchNewPairs, ms);
}

// Listeners
document.getElementById('sortBy').addEventListener('change', render);
document.getElementById('refreshInterval').addEventListener('change', setupTimer);
document.getElementById('searchInput').addEventListener('input', render);
['fMinLiq','fMinVol','fMinTxns','fMaxAge'].forEach(id =>
  document.getElementById(id).addEventListener('change', render)
);
document.getElementById('fHideRugs').addEventListener('change', render);

// ==================== START ====================
fetchNewPairs();
setupTimer();
</script>
</body>
</html>
